<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f78166"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg)" rx="10"/>

  <!-- Subtle grid lines -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40"  x2="800" y2="40"/>
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
  </g>

  <!-- Entropy curve (stylised -p ln p shape) -->
  <path d="M 30 140 Q 80 20 130 60 Q 160 80 190 140"
        stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.4" filter="url(#glow)"/>
  <path d="M 35 140 Q 85 22 135 62 Q 162 82 192 140"
        stroke="#bc8cff" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Accent underline bar -->
  <rect x="60" y="108" width="340" height="3" rx="2" fill="url(#accent)" opacity="0.85"/>

  <!-- Main title -->
  <text x="60" y="98" font-size="52" font-weight="900"
        fill="url(#accent)" filter="url(#glow)" letter-spacing="6">NERVES</text>

  <!-- Subtitle -->
  <text x="61" y="130" font-size="11.5" fill="#8b949e" letter-spacing="1.5">
    NORMALIZED ENTROPY REPRESENTATION OF VOXELWISE EIGENVALUE SPECTRA
  </text>

  <!-- Right-side decorative eigenvalue display -->
  <g transform="translate(590, 28)" font-size="11" fill="#3d8bff" opacity="0.75" font-family="'Courier New', monospace">
    <text x="0" y="0"  fill="#58a6ff">λ₁ = 1.500</text>
    <text x="0" y="18" fill="#bc8cff">λ₂ = 0.750</text>
    <text x="0" y="36" fill="#f78166">λ₃ = 0.250</text>
    <line x1="0" y1="48" x2="110" y2="48" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="64" fill="#7ee787">NDE = 0.817</text>
    <text x="0" y="80" fill="#e3b341">FA  = 0.643</text>
  </g>

  <!-- Subtle border -->
  <rect width="800" height="160" fill="none" stroke="#30363d" stroke-width="1" rx="10"/>
</svg>
